name: Build & Publish

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Cache Electron (Windows)
        uses: actions/cache@v4
        with:
          path: |
            ~\AppData\Local\electron\Cache
            ~\AppData\Local\electron-builder\Cache
          key: ${{ runner.os }}-electron-tools-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-tools-

      - name: Instalar dependências (Windows, retry)
        env:
          ELECTRON_CACHE: C:\Users\runneradmin\AppData\Local\electron\Cache
        run: |
          npm config set fetch-retries 5
          npm config set fetch-retry-factor 2
          npm config set fetch-retry-mintimeout 20000
          npm config set fetch-retry-maxtimeout 120000
          for ($i = 1; $i -le 3; $i++) {
            npm install
            if ($LASTEXITCODE -eq 0) { exit 0 }
            Write-Host "npm install falhou na tentativa $i. Repetindo em 20s..."
            Start-Sleep -Seconds 20
          }
          Write-Host "npm install falhou após 3 tentativas."
          exit 1

      - name: Build e publicar app (Windows)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ELECTRON_CACHE: C:\Users\runneradmin\AppData\Local\electron\Cache
          ELECTRON_BUILDER_CACHE: C:\Users\runneradmin\AppData\Local\electron-builder\Cache
        run: |
          for ($i = 1; $i -le 3; $i++) {
            npm run release:win
            if ($LASTEXITCODE -eq 0) { exit 0 }
            Write-Host "Tentativa $i falhou. Repetindo em 20s..."
            Start-Sleep -Seconds 20
          }
          Write-Host "Falhou após 3 tentativas."
          exit 1

  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Cache Electron
        uses: actions/cache@v4
        with:
          path: ~/.cache/electron
          key: ${{ runner.os }}-electron-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-

      - name: Instalar dependências (Linux, retry)
        env:
          ELECTRON_CACHE: ~/.cache/electron
        run: |
          npm config set fetch-retries 5
          npm config set fetch-retry-factor 2
          npm config set fetch-retry-mintimeout 20000
          npm config set fetch-retry-maxtimeout 120000
          for i in 1 2 3; do
            npm install && exit 0
            echo "npm install falhou na tentativa $i. Repetindo em 20s..."
            sleep 20
          done
          echo "npm install falhou após 3 tentativas."
          exit 1

      - name: Build e publicar app (Linux)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ELECTRON_CACHE: ~/.cache/electron
        run: |
          for i in 1 2 3; do
            npm run release:linux && exit 0
            echo "Tentativa $i falhou. Repetindo em 15s..."
            sleep 15
          done
          echo "Falhou após 3 tentativas."
          exit 1
